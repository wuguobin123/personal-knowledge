services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_BIND_ADDRESS:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE:-768}
    container_name: blog-migrate
    restart: "no"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    command: ["npm", "run", "db:migrate:safe"]
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE:-768}
    container_name: blog-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      OSS_REGION: ${OSS_REGION}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_PUBLIC_URL: ${OSS_PUBLIC_URL}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-R1-Distill-Qwen-32B}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      SOCIALDATA_API_KEY: ${SOCIALDATA_API_KEY:-}
      TWITTER_MONITOR_USERNAMES: ${TWITTER_MONITOR_USERNAMES:-}
      TWITTER_TIMEZONE: ${TWITTER_TIMEZONE:-Asia/Shanghai}
      TWITTER_RUN_AT: ${TWITTER_RUN_AT:-06:50}
      TWITTER_RUN_ON_START: ${TWITTER_RUN_ON_START:-false}
      TWITTER_CHECK_INTERVAL_SECONDS: ${TWITTER_CHECK_INTERVAL_SECONDS:-60}
      TWITTER_RETRY_COOLDOWN_SECONDS: ${TWITTER_RETRY_COOLDOWN_SECONDS:-900}
      TWITTER_FETCH_TIMEOUT_MS: ${TWITTER_FETCH_TIMEOUT_MS:-15000}
      TWITTER_MAX_PAGES_PER_ACCOUNT: ${TWITTER_MAX_PAGES_PER_ACCOUNT:-3}
      TWITTER_INITIAL_LOOKBACK_DAYS: ${TWITTER_INITIAL_LOOKBACK_DAYS:-2}
      TWITTER_INCLUDE_REPLIES: ${TWITTER_INCLUDE_REPLIES:-false}
      TWITTER_INCLUDE_RETWEETS: ${TWITTER_INCLUDE_RETWEETS:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE:-768}
    container_name: blog-scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      AI_NEWS_TIMEZONE: ${AI_NEWS_TIMEZONE:-Asia/Shanghai}
      AI_NEWS_RUN_AT: ${AI_NEWS_RUN_AT:-07:00}
      AI_NEWS_RUN_ON_START: ${AI_NEWS_RUN_ON_START:-false}
      AI_NEWS_CHECK_INTERVAL_SECONDS: ${AI_NEWS_CHECK_INTERVAL_SECONDS:-60}
      AI_NEWS_RETRY_COOLDOWN_SECONDS: ${AI_NEWS_RETRY_COOLDOWN_SECONDS:-900}
      AI_NEWS_MAX_NEWS_ITEMS: ${AI_NEWS_MAX_NEWS_ITEMS:-25}
      AI_NEWS_MAX_GITHUB_ITEMS: ${AI_NEWS_MAX_GITHUB_ITEMS:-20}
      AI_NEWS_FETCH_TIMEOUT_MS: ${AI_NEWS_FETCH_TIMEOUT_MS:-15000}
      AI_NEWS_TRANSLATE_TIMEOUT_MS: ${AI_NEWS_TRANSLATE_TIMEOUT_MS:-45000}
      AI_NEWS_TRANSLATE_BATCH_SIZE: ${AI_NEWS_TRANSLATE_BATCH_SIZE:-8}
      AI_NEWS_GITHUB_HIGH_STAR_THRESHOLD: ${AI_NEWS_GITHUB_HIGH_STAR_THRESHOLD:-200}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-R1-Distill-Qwen-32B}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      SOCIALDATA_API_KEY: ${SOCIALDATA_API_KEY:-}
      TWITTER_MONITOR_USERNAMES: ${TWITTER_MONITOR_USERNAMES:-}
      TWITTER_TIMEZONE: ${TWITTER_TIMEZONE:-Asia/Shanghai}
      TWITTER_RUN_AT: ${TWITTER_RUN_AT:-06:50}
      TWITTER_RUN_ON_START: ${TWITTER_RUN_ON_START:-false}
      TWITTER_CHECK_INTERVAL_SECONDS: ${TWITTER_CHECK_INTERVAL_SECONDS:-60}
      TWITTER_RETRY_COOLDOWN_SECONDS: ${TWITTER_RETRY_COOLDOWN_SECONDS:-900}
      TWITTER_FETCH_TIMEOUT_MS: ${TWITTER_FETCH_TIMEOUT_MS:-15000}
      TWITTER_MAX_PAGES_PER_ACCOUNT: ${TWITTER_MAX_PAGES_PER_ACCOUNT:-3}
      TWITTER_INITIAL_LOOKBACK_DAYS: ${TWITTER_INITIAL_LOOKBACK_DAYS:-2}
      TWITTER_INCLUDE_REPLIES: ${TWITTER_INCLUDE_REPLIES:-false}
      TWITTER_INCLUDE_RETWEETS: ${TWITTER_INCLUDE_RETWEETS:-false}
    command: ["npm", "run", "scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    image: personal-knowledge-nginx:latest
    container_name: blog-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

volumes:
  mysql_data:
  uploads_data:
